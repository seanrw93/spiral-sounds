<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plaster&family=Poppins:wght@400;600;700&display=swap"
    rel="stylesheet">
  <title>Spiral Sounds</title>
</head>

<body>
  <div class="top-banner">
  <button class="menu-toggle" aria-label="Toggle menu"><img src="images/menu.svg"></button>
    <nav class="header-menu" aria-label="Main menu">
      <a href="/login.html" aria-current="page">Login</a>
      <a href="/signup.html">Sign up</a>
    </nav>
  </div>

  <header>
    <a href="/"><img src="https://i.imgur.com/p24IMXy.png" alt="Spiral Sounds Logo"></a>
    <div class="header-text">
      <h1>Spiral Sounds</h1>
      <p class="subhead">The best in vinyl</p>
    </div>
  </header>

  <main class="sign-forms">

    <!-- Reset password form -->
    <form class="sign-form" id="reset-password-form" autocomplete="off">
      <div class="form-inner">
        <h2>Reset password</h2>
        
        <label for="reset-password">Enter new password</label>
        <input type="password" id="reset-password" name="new-password" required />

        <label for="confirm-password">Confirm password</label>
        <input type="password" id="confirm-password" name="confirm-password" required />

        <button type="submit" class="form-btn">Submit</button>
        <p>Remembered your password? <a href="/login.html" id="back-to-login-link" class="sign-link">Log in here</a>.</p>
      </div>
    </form>
    <p id="error-message" class="error"></p>
  </main>
  <footer>
    <p>© Spiral Sounds</p>
  </footer>
  <script src="js/ui/menu.js" type="module"></script>
  <script src="js/auth/resetPassword.js" type="module"></script>
</body>

</html>
