<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,600,700,800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="https://i.imgur.com/p24IMXy.png">
  <title>Reset Password — Spiral Sounds</title>
</head>

<body>

  <!-- ===== Sticky Navbar ===== -->
  <div class="top-banner" id="top-banner">
    <a href="/" class="nav-logo" aria-label="Spiral Sounds home">
      <img src="https://i.imgur.com/p24IMXy.png" alt="">
      Spiral Sounds
    </a>

    <div class="nav-right">
      <nav class="nav-auth" id="header-menu" aria-label="Account">
        <a href="/login.html" class="nav-auth-link">Log in</a>
        <a href="/signup.html" class="nav-auth-btn">Sign up</a>
      </nav>
      <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <line class="bar bar-top" x1="3" y1="5"  x2="21" y2="5"/>
          <line class="bar bar-mid" x1="3" y1="12" x2="21" y2="12"/>
          <line class="bar bar-bot" x1="3" y1="19" x2="21" y2="19"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile overlay -->
  <div class="menu-overlay" id="menu-overlay" aria-hidden="true"></div>

  <!-- ===== Auth card ===== -->
  <main class="sign-forms">
    <form class="sign-form" id="reset-password-form" autocomplete="off" novalidate>
      <h2>Reset password</h2>
      <div class="form-inner">

        <div class="field-wrap">
          <label for="reset-password">New password</label>
          <input type="password" id="reset-password" name="new-password" placeholder="••••••••" required autocomplete="new-password">
        </div>

        <div class="field-wrap">
          <label for="confirm-password">Confirm password</label>
          <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required autocomplete="new-password">
        </div>

        <button type="submit" class="form-btn">Set new password</button>
        <p>Remembered your password? <a href="/login.html" id="back-to-login-link" class="sign-link">Log in here</a>.</p>
      </div>
    </form>
    <p id="error-message" class="error" aria-live="polite"></p>
  </main>

  <footer>
    <p>© 2025 Spiral Sounds. All rights reserved.</p>
  </footer>

  <script src="js/ui/menu.js" type="module"></script>
  <script src="js/auth/resetPassword.js" type="module"></script>
</body>

</html>
