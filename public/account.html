<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,600,700,800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="https://i.imgur.com/p24IMXy.png">
  <title>Account — Spiral Sounds</title>
</head>

<body>

  <!-- ===== Sticky Navbar ===== -->
  <div class="top-banner" id="top-banner">
    <a href="/" class="nav-logo" aria-label="Spiral Sounds home">
      <img src="https://i.imgur.com/p24IMXy.png" alt="">
      Spiral Sounds
    </a>

    <div class="nav-right">
      <p id="greeting" class="top-banner-greeting"></p>
      <nav class="nav-auth" id="header-menu" aria-label="Account">
        <a href="/login.html" id="login" class="nav-auth-link">Log in</a>
        <a href="/signup.html" id="signup" class="nav-auth-btn">Sign up</a>
        <div class="user-menu" id="user-menu">
          <button class="user-menu-trigger" id="user-menu-trigger" aria-haspopup="true" aria-expanded="false">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            <span id="user-menu-name"></span>
            <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          <div class="user-menu-dropdown" id="user-menu-dropdown" role="menu">
            <a href="/orders.html" class="user-menu-item" role="menuitem">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
              Order History
            </a>
            <a href="/account.html" class="user-menu-item active" role="menuitem" aria-current="page">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
              Account
            </a>
            <div class="user-menu-divider"></div>
            <button class="user-menu-item user-menu-logout" id="logout-btn" role="menuitem">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Log out
            </button>
          </div>
        </div>
      </nav>
      <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <line class="bar bar-top" x1="3" y1="5"  x2="21" y2="5"/>
          <line class="bar bar-mid" x1="3" y1="12" x2="21" y2="12"/>
          <line class="bar bar-bot" x1="3" y1="19" x2="21" y2="19"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="menu-overlay" id="menu-overlay" aria-hidden="true"></div>

  <main class="page-main">
    <div class="page-header">
      <h1>Account</h1>
      <p class="page-subtitle">Your profile details</p>
    </div>
    <div id="account-container"></div>
  </main>

  <footer>
    <p>© 2025 Spiral Sounds. All rights reserved.</p>
  </footer>

  <script src="js/ui/menu.js" type="module"></script>
  <script src="js/ui/accountUI.js" type="module"></script>
</body>

</html>
